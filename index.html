<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hypervoid-runner</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #111326 0%, #05060f 50%, #000 100%);
      }
      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      .panel {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(3, 5, 14, 0.72);
        z-index: 20;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        padding: 20px;
        background: rgba(12, 15, 33, 0.95);
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
      }
      h1, h2, p { margin: 0 0 12px; }
      input, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.25);
        padding: 10px 12px;
        font: inherit;
        color: white;
        background: rgba(255,255,255,0.08);
        margin-top: 8px;
      }
      button {
        cursor: pointer;
        background: linear-gradient(90deg, #6545ff, #2ad0ff);
        border: none;
        font-weight: 700;
      }
      #hud {
        position: absolute;
        inset: 16px 16px auto 16px;
        display: flex;
        justify-content: space-between;
        z-index: 10;
        font-weight: 700;
        text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        pointer-events: none;
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
