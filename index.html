<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hypervoid-runner</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        width: 100%;
        height: 100%;
      }
      body {
        margin: 0;
        overflow: hidden;
        min-height: 100dvh;
        font-family: Bahnschrift, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 10%, rgba(57, 191, 255, 0.18), transparent 28%),
          radial-gradient(circle at 82% 18%, rgba(83, 110, 255, 0.14), transparent 32%),
          radial-gradient(circle at top, #0a1423 0%, #03050d 54%, #010103 100%);
        color: #ecfcff;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.03), transparent 24%),
          repeating-linear-gradient(
            180deg,
            rgba(255,255,255,0.02) 0,
            rgba(255,255,255,0.02) 1px,
            transparent 1px,
            transparent 6px
          );
        opacity: 0.45;
      }
      #app {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        position: relative;
        isolation: isolate;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      .panel {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 20px;
        background: linear-gradient(180deg, rgba(2, 5, 12, 0.4), rgba(2, 5, 12, 0.78));
        backdrop-filter: blur(14px);
        z-index: 20;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid rgba(124, 221, 255, 0.22);
        border-radius: 22px;
        padding: 24px;
        background: linear-gradient(180deg, rgba(10, 18, 35, 0.98), rgba(6, 10, 22, 0.94));
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      h1, h2, p { margin: 0 0 12px; }
      h2 {
        font-size: clamp(1.8rem, 4vw, 2.3rem);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .lede {
        color: rgba(214, 239, 248, 0.76);
        line-height: 1.6;
      }
      .field {
        display: grid;
        gap: 8px;
        margin-top: 18px;
        color: rgba(178, 225, 238, 0.86);
        font-size: 0.95rem;
      }
      input, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 14px;
        border: 1px solid rgba(129, 213, 255, 0.22);
        padding: 12px 14px;
        font: inherit;
        color: white;
        background: rgba(255,255,255,0.08);
        margin-top: 8px;
      }
      input:focus {
        outline: none;
        border-color: rgba(127, 226, 255, 0.55);
        box-shadow: 0 0 0 3px rgba(68, 205, 255, 0.12);
      }
      .hint-list {
        display: grid;
        gap: 8px;
        margin: 16px 0 8px;
      }
      .hint-list span,
      .results p {
        margin: 0;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(125, 195, 255, 0.08);
        border: 1px solid rgba(144, 227, 255, 0.12);
        color: rgba(225, 246, 255, 0.88);
      }
      .results {
        display: grid;
        gap: 10px;
        margin: 18px 0 6px;
      }
      button {
        cursor: pointer;
        margin-top: 14px;
        background: linear-gradient(135deg, #21b7ff, #5973ff);
        border: none;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(58, 137, 255, 0.24);
      }
      #hud {
        position: absolute;
        inset: 16px 16px auto 16px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        z-index: 10;
        pointer-events: none;
      }
      .hud-chip {
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(6, 12, 26, 0.66);
        border: 1px solid rgba(124, 221, 255, 0.16);
        backdrop-filter: blur(12px);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      }
      .hud-label {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(181, 226, 239, 0.66);
      }
      .hud-value {
        display: block;
        margin-top: 6px;
        font-size: clamp(1rem, 2.8vw, 1.25rem);
        text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      }
      #feedback-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        z-index: 9;
        transition: opacity 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      }
      #feedback-layer.active {
        opacity: 1;
      }
      #feedback-layer.coin {
        box-shadow: inset 0 0 150px rgba(120, 250, 255, 0.12);
        background: radial-gradient(circle at center, rgba(120, 250, 255, 0.08), transparent 58%);
      }
      #feedback-layer.near {
        box-shadow: inset 0 0 180px rgba(255, 209, 91, 0.14);
        background: radial-gradient(circle at center, rgba(255, 203, 83, 0.08), transparent 54%);
      }
      #feedback-layer.collision {
        box-shadow: inset 0 0 220px rgba(255, 84, 127, 0.28);
        background: radial-gradient(circle at center, rgba(255, 70, 121, 0.14), transparent 50%);
      }
      .hidden { display: none; }
      @media (max-width: 720px) {
        #hud {
          inset: 12px 12px auto 12px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .card {
          width: min(94vw, 420px);
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
